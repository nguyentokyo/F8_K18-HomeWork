<!doctype html>
<html lang="vn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Lesson 36</title>
    <style>
        #edit-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #edit-modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 600px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .modal-content > input {
            width: 100%;
        }
    </style>
</head>
<body>
    <button id="add-btn">Thêm sản phẩm</button>
    <br>
    <label for="title-input">Tiêu đề</label>
    <input type="text" id="title-input" placeholder="Nhập tiêu đề">
    <br>
    <label for="description-input">Nội dung</label>
    <input type="text" id="description-input" placeholder="Nhập nội dung">
    <br>
    <span id="error-message"></span>
    <hr>
    <div id="products-list"></div>
    <div id="edit-modal">
        <div class="modal-content">
            <h3>Sửa bài viết</h3>
            <label for="edit-title">Tiêu đề</label>
            <input type="text" id="edit-title">
            <br><br>
            <label for="edit-description">Nội dung</label>
            <input type="text" id="edit-description">
            <br><br>
            <button id="save-edit">Lưu</button>
            <button id="close-edit">Hủy</button>
        </div>
    </div>
    <script type="module" src="index.js"></script>
</body>
</html>
